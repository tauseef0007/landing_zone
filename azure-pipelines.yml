trigger:
  - main

pool:
  name: tauseefpool

variables:
  - group: terraform-dev

stages:

# ==========================
# VALIDATE + SECURITY SCAN
# ==========================

- stage: Validate
  displayName: Validate & Security Scan

  jobs:

  - job: Validation
    displayName: Validation

    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.13.2'

    - script: |
        terraform fmt -check -recursive
      displayName: Terraform Format Check

    - script: |
        pip install checkov
        checkov -d . --soft-fail
      displayName: Security Scan

    - script: |
        cd environments/dev
        terraform init -backend=false
        terraform validate
      displayName: Terraform Validate


# ==========================
# PLAN
# ==========================

- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate

  jobs:

  - job: TerraformPlan
    displayName: Terraform Plan

    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.13.2'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: environments/dev
        backendServiceArm: Tauseef_sc
        backendAzureRmResourceGroupName: rg-tfstate-prod
        backendAzureRmStorageAccountName: tauseeftfstate001
        backendAzureRmContainerName: tfstate
        backendAzureRmKey: dev.terraform.tfstate

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: environments/dev
        environmentServiceNameAzureRM: Tauseef_sc


# ==========================
# APPLY
# ==========================

- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan
  condition: succeeded()

  jobs:

  - deployment: DeployTerraform
    displayName: Deploy Terraform

    environment: dev

    strategy:
      runOnce:
        deploy:

          steps:

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.13.2'

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
               workingDirectory: environments/dev
               backendServiceArm: Tauseef_sc
               backendAzureRmResourceGroupName: rg-tfstate-prod
               backendAzureRmStorageAccountName: tauseeftfstate001
               backendAzureRmContainerName: tfstate
               backendAzureRmKey: dev.terraform.tfstate
               workingDirectory: environments/dev
               backendServiceArm: Tauseef_sc

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              workingDirectory: environments/dev
              environmentServiceNameAzureRM: Tauseef_sc